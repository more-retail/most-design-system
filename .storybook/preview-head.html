<link rel="stylesheet" href="tokens/tokens.css" />
<style>
  /* Global resets - apply to both the canvas and docs views */

  html,
  body {
    scrollbar-width: none;
    -ms-overflow-style: none;

    &::-webkit-scrollbar {
      display: none;
    }
  }

  symbol path,
  svg path {
    stroke: currentColor;
    stroke-width: 0.25px;
  }

  /* Storybook docs page */

  .sbdocs-wrapper {
    background-color: var(--color-semantic-surface-raised) !important;
    padding: var(--spacing-semantic-inset-default) !important;

    .sbdocs-content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-semantic-stack-loose);

      > * {
        background-color: var(--color-semantic-surface-primary) !important;
        margin: 0 !important;
        padding: var(--spacing-semantic-inset-default) !important;
        border-radius: 16px !important;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;

        &::-webkit-scrollbar {
          display: none;
        }
      }

      /* Headings */

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        text-transform: lowercase;
      }

      h1 {
        font: var(--typography-head-10) !important;
        color: var(--color-semantic-content-primary) !important;
        text-transform: lowercase !important;
        letter-spacing: 0 !important;
      }

      h2 {
        font: var(--typography-head-20) !important;
        color: var(--color-semantic-content-primary) !important;
        text-transform: lowercase !important;
        letter-spacing: 0 !important;
      }

      h3 {
        font: var(--typography-head-30) !important;
        color: var(--color-semantic-content-primary) !important;
        text-transform: lowercase !important;
        letter-spacing: 0 !important;
      }

      h4 {
        font: var(--typography-head-40) !important;
        color: var(--color-semantic-content-primary) !important;
        text-transform: lowercase !important;
        letter-spacing: 0 !important;
      }

      h5 {
        font: var(--typography-head-50) !important;
        color: var(--color-semantic-content-primary) !important;
        text-transform: lowercase !important;
        letter-spacing: 0 !important;
      }

      h6 {
        font: var(--typography-head-60) !important;
        color: var(--color-semantic-content-primary) !important;
        text-transform: lowercase !important;
        letter-spacing: 0 !important;
      }

      div[id^="anchor--"] > h3 > a {
        display: none !important;
      }

      /* Story preview canvas */

      .sbdocs-preview {
        margin: 0 !important;
        box-shadow: none !important;

        .docs-story {
          padding: var(--spacing-base-100) !important;
          padding-bottom: var(--spacing-base-180) !important;
        }

        [role="toolbar"] svg {
          width: 12px !important;
          height: 12px !important;
          color: var(--color-semantic-content-primary) !important;
        }
      }

      /* Show code / Copy code buttons - matches the toolbar buttons above the
         canvas (.sb-bar button in manager-head.html): same sizing, font, hover,
         and filled + ring "active" state for the toggle when expanded. */

      .sbdocs-preview-actions {
        margin: 0 !important;
        min-height: 0 !important;

        svg {
          width: 12px !important;
          height: 12px !important;
          color: var(--color-semantic-content-primary) !important;
        }

        > div {
          min-height: 0 !important;
          margin-top: var(--spacing-semantic-stack-tight);
        }

        button {
          min-width: 24px !important;
          min-height: 24px !important;
          border-radius: 9999px !important;
          padding: var(--spacing-semantic-inset-tight) !important;
          gap: var(--spacing-semantic-inline-default) !important;
          font-size: 12px !important;
          font-weight: 600 !important;
          color: var(--color-semantic-content-primary) !important;
          outline: none !important;
          box-shadow: inset 0 0 0 0px transparent;
          transition:
            background-color 150ms ease,
            box-shadow 150ms ease;

          background-color: transparent !important;

          &:hover {
            background: var(--color-semantic-surface-primary-hover) !important;
          }

          &:focus-visible {
            background: var(
              --color-semantic-surface-primary-pressed
            ) !important;
          }

          &[aria-checked="true"],
          &[aria-expanded="true"] {
            background: var(--color-semantic-surface-primary-hover) !important;
          }
        }
      }

      /* Code blocks (Source/Canvas doc block) */

      div:has(> [scrollbarsize] pre.prismjs) {
        background: var(--color-semantic-surface-inverse) !important;
        border-radius: 16px !important;
      }

      /* Addon panel controls (Controls / ArgTypes table), matching manager-head.html */

      div:has(> div > .docblock-argstable) {
        padding: 0 !important;

        > div:has(> .docblock-argstable) {
          border-radius: 12px;
          overflow: hidden !important;

          > .docblock-argstable {
            margin: 0 !important;

            svg {
              color: var(--color-semantic-content-primary);
            }

            thead.docblock-argstable-head > tr > th {
              padding-top: 16px !important;
            }

            tr {
              border-radius: 12px;
            }

            tbody.docblock-argstable-body {
              &,
              * {
                border-radius: 12px !important;
                filter: none !important;
                box-shadow: none !important;
              }

              td {
                vertical-align: middle !important;
              }

              textarea {
                min-height: 48px !important;
                padding: var(--spacing-semantic-inline-looser) !important;
                outline: none !important;
                box-shadow: inset 0 0 0 0px transparent;
                transition: box-shadow 150ms ease;

                &:hover {
                  box-shadow: inset 0 0 0 2px var(--color-base-neutral-30) !important;
                }

                &:focus-visible {
                  box-shadow: inset 0 0 0 2px var(--color-semantic-border-focus) !important;
                }
              }

              select {
                height: 48px !important;
                padding-inline: var(
                  --spacing-semantic-inset-default
                ) !important;
                outline: none !important;
                box-shadow: inset 0 0 0 0px transparent !important;
                transition: box-shadow 150ms ease;

                &:hover {
                  box-shadow: inset 0 0 0 2px var(--color-base-neutral-30) !important;
                }

                &:focus-visible {
                  box-shadow: inset 0 0 0 2px var(--color-semantic-border-focus) !important;
                }
              }

              label[for^="control-"] {
                box-shadow: inset 0 0 0 0px transparent;
                transition: box-shadow 150ms ease;

                &:hover {
                  box-shadow: inset 0 0 0 2px var(--color-base-neutral-30) !important;
                }

                &:focus-within {
                  box-shadow: inset 0 0 0 2px var(--color-semantic-border-focus) !important;
                }
              }

              button[id^="set-"] {
                outline: none !important;
                box-shadow: inset 0 0 0 0px transparent;
                transition: box-shadow 150ms ease;

                &:hover {
                  box-shadow: inset 0 0 0 2px var(--color-base-neutral-30) !important;
                }

                &:focus-visible {
                  box-shadow: inset 0 0 0 2px var(--color-semantic-border-focus) !important;
                }
              }

              [id^="control-"][role="switch"] {
                outline: none !important;

                ~ span {
                  height: 48px !important;
                  display: inline-flex !important;
                  justify-content: center;
                  align-items: center;
                  margin: 2px;
                }
              }

              tr[title^="Hide "],
              tr[title^="Show "] {
                > td {
                  border-radius: 0 !important;
                  background-color: var(
                    --color-semantic-surface-raised
                  ) !important;

                  * {
                    text-transform: capitalize !important;
                    letter-spacing: 0 !important;
                  }
                }

                button {
                  color: transparent !important;
                }
              }
            }
          }
        }
      }
    }
  }
</style>
